                    type: object
                  description:
                    description: |-
                      The description of the cluster.

                      Deprecated: read via ClusterSpec.Description. Retained for
                      backward compatibility with consumers that grew up on the
                      flat-field observation; will be removed in the next API
                      version bump.
                    type: string
                  healthStatus:
                    description: The health status of the cluster.
                    properties:
                      code:
                        description: Code reported by the Akuity API.
                        format: int32
                        type: integer
                      message:
                        description: Message reported by the Akuity API.
                        type: string
                    type: object
                  id:
                    description: The ID of the cluster.
                    type: string
                  kustomization:
                    description: |-
                      A Kustomization to apply to the cluster resource.

                      Deprecated: read via ClusterSpec.Data.Kustomization.
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels applied to the cluster.
                    type: object
                  name:
                    description: The name of the cluster.
                    type: string
                  namespace:
                    description: The Kubernetes namespace the Akuity agent is installed
                      in.
                    type: string
                  namespaceScoped:
                    description: |-
                      Whether or not the Akuity agent is namespace-scoped.

                      Deprecated: read via ClusterSpec.NamespaceScoped. See
                      Description for the deprecation rationale.
                    type: boolean
                  reconciliationStatus:
                    description: The reconciliation status of the cluster.
                    properties:
                      code:
                        description: Code reported by the Akuity API.
                        format: int32
                        type: integer
                      message:
                        description: Message reported by the Akuity API.
                        type: string
                    type: object
                  redisTunneling:
                    description: |-
                      Whether or not the agent should connect to Redis over a web-socket tunnel
                      / in order to support running the agent behind a HTTPS proxy.

                      Deprecated: read via ClusterSpec.Data.RedisTunneling.
                    type: boolean
                  targetVersion:
                    description: |-
                      The desired version of the agent to run on the cluster.

                      Deprecated: read via ClusterSpec.Data.TargetVersion.
                    type: string
                required:
                - id
                - name
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
