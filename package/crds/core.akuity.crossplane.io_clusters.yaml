          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A ClusterSpec defines the desired state of a Cluster.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: |-
                  ClusterParameters are the configurable fields of a Cluster.

                  v0.3.1 lateInitialize stamps `instanceId` onto spec while the user
                  supplied `instanceRef`, so stored legacy Clusters carry BOTH fields.
                  A strict XOR rule would reject every UPDATE (including status
                  subresource) on those stored CRs because k8s CRD validation
                  ratcheting cannot decompose a cross-field rule. Relax to "at least
                  one must be set"; the controller resolves `instanceRef` first and
                  falls back to `instanceId`, so both-set state is well-defined.

                  The immutability rule uses `has()` guards on both sides — k8s CEL
                  raises "no such key" when reading an omitempty string that is absent
                  from the JSON payload (observed on k8s 1.31 under k3s), so
                  `self.instanceId == oldSelf.instanceId` explodes on fresh-state
                  Clusters the this-PR controller stamps `instanceId` onto after
                  resolving `instanceRef`. Guarded form: allow a first-time stamp of
                  `instanceId` when `oldSelf` had none; once stamped, the value must
                  match on every subsequent UPDATE. Same pattern for `instanceRef`.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations to apply to the cluster custom resource.
                      Optional.
                    type: object
                  clusterSpec:
                    description: Attributes of the cluster. Optional.
                    properties:
                      data:
                        properties:
                          appReplication:
                            type: boolean
                          argocdNotificationsSettings:
                            properties:
                              inClusterSettings:
                                type: boolean
                            type: object
                          autoUpgradeDisabled:
                            type: boolean
                          autoscalerConfig:
                            properties:
                              applicationController:
                                properties:
                                  resourceMaximum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                  resourceMinimum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                type: object
                              repoServer:
                                properties:
                                  replicaMaximum:
                                    format: int32
                                    type: integer
                                  replicaMinimum:
                                    format: int32
                                    type: integer
                                  resourceMaximum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                  resourceMinimum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                type: object
                            type: object
                          compatibility:
                            properties:
                              ipv6Only:
                                type: boolean
                            type: object
                          datadogAnnotationsEnabled:
                            type: boolean
                          directClusterSpec:
                            properties:
                              caData:
                                type: string
                              clusterType:
                                type: string
                              kargoInstanceId:
                                type: string
                              organization:
                                type: string
                              server:
                                type: string
                              token:
                                type: string
                            type: object
                          eksAddonEnabled:
