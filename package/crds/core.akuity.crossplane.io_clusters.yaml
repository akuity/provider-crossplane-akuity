                          kustomization:
                            type: string
                          maintenanceMode:
                            type: boolean
                          maintenanceModeExpiry:
                            type: string
                          managedClusterConfig:
                            properties:
                              secretKey:
                                type: string
                              secretName:
                                type: string
                            type: object
                          multiClusterK8sDashboardEnabled:
                            type: boolean
                          podInheritMetadata:
                            type: boolean
                          project:
                            type: string
                          redisTunneling:
                            type: boolean
                          serverSideDiffEnabled:
                            type: boolean
                          size:
