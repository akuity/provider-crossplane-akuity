                          kustomization:
                            type: string
                          maintenanceMode:
                            type: boolean
                          maintenanceModeExpiry:
                            type: string
                          managedClusterConfig:
                            properties:
                              secretKey:
                                type: string
                              secretName:
                                type: string
                            type: object
                          multiClusterK8sDashboardEnabled:
                            type: boolean
                          podInheritMetadata:
                            type: boolean
                          project:
                            type: string
                          redisTunneling:
                            type: boolean
                          serverSideDiffEnabled:
                            type: boolean
                          size:
                            type: string
                          targetVersion:
                            type: string
                        type: object
                      description:
                        type: string
                      namespaceScoped:
                        type: boolean
                    type: object
                  enableInClusterKubeconfig:
                    description: |-
                      Rather than specifying a reference to a KubeConfig to use to connect to the cluster,
                      we can enable incluster config if the managed cluster is the same cluster the
                      Crossplane is running in. Optional.
                    type: boolean
                  instanceId:
                    description: |-
                      The ID of the Akuity ArgoCD instance the cluster belongs to.
                      Mutually exclusive with InstanceRef.
                    type: string
                  instanceRef:
                    description: |-
                      The reference to the Akuity ArgoCD instance the cluster belongs to.
                      Mutually exclusive with InstanceID.
                    properties:
                      name:
                        description: Name of the referenced object. Required.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  kubeconfigSecretRef:
                    description: |-
                      A reference to a Kubernetes secret containing a KubeConfig that can be used to connect
                      to the cluster to apply the agent manifests. Optional.
                    properties:
                      name:
                        description: The name of the Kubernetes secret being referenced.
                          Required.
                        type: string
                      namespace:
                        description: The namespace of the Kubernetes secret being
                          referenced. Required.
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels to apply to the cluster custom resource. Optional.
                    type: object
                  name:
                    description: The name of the cluster. Required.
                    minLength: 1
                    type: string
                  namespace:
                    description: The Kubernetes namespace the Akuity agent should
                      be installed in. Optional.
                    type: string
                  removeAgentResourcesOnDestroy:
                    description: |-
                      Whether or not to remove the Akuity agent Kubernetes resources from the managed cluster
                      when destroying the cluster. Optional. Defaults to true.
                    type: boolean
                required:
                - name
                type: object
                x-kubernetes-validations:
                - message: instanceId or instanceRef must be set
                  rule: has(self.instanceId) || has(self.instanceRef)
                - message: instanceId/instanceRef are immutable
                  rule: (!has(oldSelf.instanceId) || (has(self.instanceId) && self.instanceId
                    == oldSelf.instanceId)) && (!has(oldSelf.instanceRef) || (has(self.instanceRef)
                    && self.instanceRef.name == oldSelf.instanceRef.name))
                - message: name is immutable
                  rule: self.name == oldSelf.name
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  This field is planned to replace the DeletionPolicy field in a future
                  release. Currently, both could be set independently and non-default
                  values would be honored if the feature flag is enabled. If both are
                  custom, the DeletionPolicy field will be ignored.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                  namespace:
                    description: Namespace of the secret.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - forProvider
            type: object
          status:
            description: A ClusterStatus represents the observed state of a Cluster.
            properties:
              atProvider:
                description: ClusterObservation are the observable fields of a Cluster.
                properties:
                  agentSize:
                    description: |-
                      The size of the agent to run on the cluster.

                      Deprecated: read via ClusterSpec.Data.Size.
                    type: string
                  agentState:
                    description: The status of each agent running in the cluster.
                    properties:
                      argoCdVersion:
                        type: string
                      statuses:
                        additionalProperties:
                          properties:
                            code:
                              format: int32
                              type: integer
                            message:
                              type: string
                          type: object
                        type: object
                      version:
                        type: string
                    type: object
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations applied to the cluster.
                    type: object
                  appReplication:
                    description: |-
                      Whether or not state replication to the managed cluster is enabled.
                      When enabled, the managed cluster retains core ArgoCD functionality even
                      when unable to connect to the Akuity Platform.

                      Deprecated: read via ClusterSpec.Data.AppReplication.
                    type: boolean
                  autoUpgradeDisabled:
                    description: |-
                      Whether or not the agent should be autoupgraded when a new version is available.

                      Deprecated: read via ClusterSpec.Data.AutoUpgradeDisabled.
                    type: boolean
                  clusterSpec:
                    description: |-
                      ClusterSpec mirrors the desired payload observed on the most
                      recent reconcile (description + namespaceScoped + data),
                      matching the shape of spec.forProvider.clusterSpec. Provides
                      symmetry with Instance's atProvider.argocd mirror: users can
                      read the observed payload as one nested block instead of
                      grepping a dozen flat fields.
                    properties:
                      data:
                        properties:
                          appReplication:
                            type: boolean
                          argocdNotificationsSettings:
                            properties:
                              inClusterSettings:
                                type: boolean
                            type: object
                          autoUpgradeDisabled:
                            type: boolean
                          autoscalerConfig:
                            properties:
                              applicationController:
                                properties:
                                  resourceMaximum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                  resourceMinimum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                type: object
                              repoServer:
                                properties:
                                  replicaMaximum:
                                    format: int32
                                    type: integer
                                  replicaMinimum:
                                    format: int32
                                    type: integer
                                  resourceMaximum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                  resourceMinimum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                type: object
                            type: object
                          compatibility:
                            properties:
                              ipv6Only:
                                type: boolean
                            type: object
                          datadogAnnotationsEnabled:
                            type: boolean
                          directClusterSpec:
                            properties:
                              caData:
                                type: string
                              clusterType:
                                type: string
                              kargoInstanceId:
                                type: string
                              organization:
                                type: string
                              server:
