      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: A Cluster is an Akuity Argo CD cluster registration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A ClusterSpec defines the desired state of a Cluster.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: |-
                  ClusterParameters are the configurable fields of a Cluster.

                  Stored legacy Clusters may carry both instanceId and instanceRef.
                  A strict XOR rule would reject updates to those CRs because CRD
                  validation ratcheting cannot decompose a cross-field rule. The rule
                  therefore requires at least one value; the controller resolves
                  instanceRef first and falls back to instanceId, so both-set state is
                  well-defined.

                  The immutability rule uses has() guards because k8s CEL raises "no
                  such key" when reading an absent omitempty string. This allows the
                  controller's first-time instanceId stamp after resolving instanceRef,
                  then requires stable values on subsequent updates.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations applied to the cluster custom resource.
                    type: object
                  clusterSpec:
                    description: ClusterSpec contains the cluster configuration sent
                      to the Akuity platform.
                    properties:
                      data:
                        properties:
                          appReplication:
                            type: boolean
                          argocdNotificationsSettings:
                            properties:
                              inClusterSettings:
                                type: boolean
                            type: object
                          autoUpgradeDisabled:
                            type: boolean
                          autoscalerConfig:
                            properties:
                              applicationController:
                                properties:
                                  resourceMaximum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                  resourceMinimum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                type: object
                              repoServer:
                                properties:
                                  replicaMaximum:
                                    format: int32
                                    type: integer
                                  replicaMinimum:
                                    format: int32
                                    type: integer
                                  resourceMaximum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                  resourceMinimum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                type: object
                            type: object
                          compatibility:
                            properties:
                              ipv6Only:
                                type: boolean
                            type: object
                          datadogAnnotationsEnabled:
                            type: boolean
                          directClusterSpec:
                            properties:
                              caData:
                                type: string
                              clusterType:
                                type: string
                              kargoInstanceId:
                                type: string
                              organization:
                                type: string
                              server:
                                type: string
                              token:
                                type: string
                            type: object
                          eksAddonEnabled:
                            type: boolean
                          kustomization:
                            type: string
                          maintenanceMode:
                            type: boolean
                          maintenanceModeExpiry:
                            type: string
                          managedClusterConfig:
                            properties:
                              secretKey:
                                type: string
                              secretName:
                                type: string
                            type: object
                          multiClusterK8sDashboardEnabled:
                            type: boolean
                          podInheritMetadata:
                            type: boolean
                          project:
                            type: string
                          redisTunneling:
                            type: boolean
                          serverSideDiffEnabled:
                            type: boolean
                          size:
                            type: string
                          targetVersion:
                            type: string
                        type: object
                      description:
                        type: string
                      namespaceScoped:
                        type: boolean
                    type: object
                  enableInClusterKubeconfig:
                    description: |-
                      EnableInClusterKubeConfig uses the provider pod's in-cluster
                      configuration when the managed cluster is the provider cluster.
                    type: boolean
                  instanceId:
                    description: |-
                      InstanceID is the Akuity Argo CD instance ID this cluster belongs to.
                      Mutually exclusive with InstanceRef.
                    type: string
                  instanceRef:
                    description: |-
                      InstanceRef references the Akuity Argo CD instance this cluster belongs to.
                      Mutually exclusive with InstanceID.
                    properties:
                      name:
                        description: Name is the referenced object's name. Required.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  kubeconfigSecretRef:
                    description: |-
                      KubeConfigSecretRef references a Secret containing a kubeconfig
                      used to apply agent manifests to the managed cluster.
                    properties:
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels applied to the cluster custom resource.
                    type: object
                  name:
                    description: Name is the Akuity cluster name. Required.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace is where the Akuity agent is installed.
                    type: string
                  removeAgentResourcesOnDestroy:
                    description: |-
                      RemoveAgentResourcesOnDestroy removes Akuity agent Kubernetes
                      resources from the managed cluster during deletion. Defaults to true.
                    type: boolean
                required:
                - name
                type: object
                x-kubernetes-validations:
                - message: instanceId or instanceRef must be set
                  rule: has(self.instanceId) || has(self.instanceRef)
                - message: instanceId/instanceRef are immutable
                  rule: (!has(oldSelf.instanceId) || (has(self.instanceId) && self.instanceId
                    == oldSelf.instanceId)) && (!has(oldSelf.instanceRef) || (has(self.instanceRef)
                    && self.instanceRef.name == oldSelf.instanceRef.name))
                - message: name is immutable
                  rule: self.name == oldSelf.name
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  This field is planned to replace the DeletionPolicy field in a future
                  release. Currently, both could be set independently and non-default
                  values would be honored if the feature flag is enabled. If both are
                  custom, the DeletionPolicy field will be ignored.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                  namespace:
                    description: Namespace of the secret.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - forProvider
            type: object
          status:
            description: A ClusterStatus represents the observed state of a Cluster.
            properties:
              atProvider:
                description: ClusterObservation contains the observable fields of
                  a Cluster.
                properties:
                  agentSize:
                    description: |-
                      The size of the agent to run on the cluster.

                      Deprecated: read via ClusterSpec.Data.Size.
                    type: string
                  agentState:
                    description: The status of each agent running in the cluster.
                    properties:
                      argoCdVersion:
                        type: string
                      statuses:
                        additionalProperties:
                          properties:
                            code:
                              format: int32
                              type: integer
                            message:
                              type: string
                          type: object
                        type: object
                      version:
                        type: string
                    type: object
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations applied to the cluster.
                    type: object
                  appReplication:
                    description: |-
                      Whether state replication to the managed cluster is enabled.
                      When enabled, the managed cluster retains core ArgoCD functionality even
                      when unable to connect to the Akuity Platform.

                      Deprecated: read via ClusterSpec.Data.AppReplication.
                    type: boolean
                  autoUpgradeDisabled:
                    description: |-
                      Whether agent auto-upgrade is disabled when a new version is available.

                      Deprecated: read via ClusterSpec.Data.AutoUpgradeDisabled.
                    type: boolean
                  clusterSpec:
                    description: |-
                      ClusterSpec mirrors the desired payload observed on the most
                      recent reconcile (description + namespaceScoped + data),
                      matching the shape of spec.forProvider.clusterSpec. Provides
                      symmetry with Instance's atProvider.argocd mirror: users can
                      read the observed payload as one nested block instead of
                      grepping a dozen flat fields.
                    properties:
                      data:
                        properties:
                          appReplication:
                            type: boolean
                          argocdNotificationsSettings:
                            properties:
                              inClusterSettings:
                                type: boolean
                            type: object
                          autoUpgradeDisabled:
                            type: boolean
                          autoscalerConfig:
                            properties:
                              applicationController:
                                properties:
                                  resourceMaximum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                  resourceMinimum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                type: object
                              repoServer:
                                properties:
                                  replicaMaximum:
                                    format: int32
                                    type: integer
                                  replicaMinimum:
                                    format: int32
                                    type: integer
                                  resourceMaximum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                  resourceMinimum:
                                    properties:
                                      cpu:
                                        type: string
                                      mem:
                                        type: string
                                    type: object
                                type: object
                            type: object
                          compatibility:
                            properties:
                              ipv6Only:
                                type: boolean
                            type: object
                          datadogAnnotationsEnabled:
                            type: boolean
                          directClusterSpec:
                            properties:
                              caData:
                                type: string
                              clusterType:
                                type: string
                              kargoInstanceId:
                                type: string
                              organization:
                                type: string
                              server:
                                type: string
                              token:
                                type: string
                            type: object
                          eksAddonEnabled:
                            type: boolean
                          kustomization:
                            type: string
                          maintenanceMode:
                            type: boolean
                          maintenanceModeExpiry:
                            type: string
                          managedClusterConfig:
                            properties:
                              secretKey:
                                type: string
                              secretName:
                                type: string
                            type: object
                          multiClusterK8sDashboardEnabled:
                            type: boolean
                          podInheritMetadata:
                            type: boolean
                          project:
                            type: string
                          redisTunneling:
                            type: boolean
                          serverSideDiffEnabled:
                            type: boolean
                          size:
                            type: string
                          targetVersion:
                            type: string
                        type: object
                      description:
                        type: string
                      namespaceScoped:
                        type: boolean
                    type: object
                  description:
                    description: |-
                      The description of the cluster.

                      Deprecated: read via ClusterSpec.Description. Retained for
                      backward compatibility with consumers that grew up on the
                      flat-field observation; will be removed in the next API
                      version bump.
                    type: string
                  healthStatus:
                    description: The health status of the cluster.
                    properties:
                      code:
                        description: Code reported by the Akuity API.
                        format: int32
                        type: integer
                      message:
                        description: Message reported by the Akuity API.
                        type: string
                    type: object
                  id:
                    description: The ID of the cluster.
                    type: string
                  kustomization:
                    description: |-
                      A Kustomization to apply to the cluster resource.

                      Deprecated: read via ClusterSpec.Data.Kustomization.
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels applied to the cluster.
                    type: object
                  name:
                    description: The name of the cluster.
                    type: string
                  namespace:
                    description: The Kubernetes namespace the Akuity agent is installed
                      in.
                    type: string
                  namespaceScoped:
                    description: |-
                      Whether the Akuity agent is namespace-scoped.

                      Deprecated: read via ClusterSpec.NamespaceScoped. See
                      Description for the deprecation rationale.
                    type: boolean
                  reconciliationStatus:
                    description: The reconciliation status of the cluster.
                    properties:
                      code:
                        description: Code reported by the Akuity API.
                        format: int32
                        type: integer
                      message:
                        description: Message reported by the Akuity API.
                        type: string
                    type: object
                  redisTunneling:
                    description: |-
                      Whether the agent connects to Redis over a websocket tunnel to
                      support running behind an HTTPS proxy.

                      Deprecated: read via ClusterSpec.Data.RedisTunneling.
                    type: boolean
                  targetVersion:
                    description: |-
                      The desired version of the agent to run on the cluster.

                      Deprecated: read via ClusterSpec.Data.TargetVersion.
                    type: string
                required:
                - id
                - name
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
