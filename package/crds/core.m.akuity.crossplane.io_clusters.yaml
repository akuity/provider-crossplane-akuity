---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: clusters.core.m.akuity.crossplane.io
spec:
  group: core.m.akuity.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akuity
    kind: Cluster
    listKind: ClusterList
    plural: clusters
    singular: cluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: A Cluster is an Akuity-managed ArgoCD agent cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A ClusterSpec defines the desired state of a Cluster.
            properties:
              forProvider:
                description: |-
                  ClusterParameters are the configurable fields of a Cluster.

                  CEL rules:
                    - Exactly one of instanceId or instanceRef must be set.
                    - maintenanceModeExpiry requires maintenanceMode=true (a non-zero
                      expiry without the gate is meaningless).
                    - size=custom requires autoscalerConfig.
                    - autoscalerConfig is only valid for size=auto or size=custom
                      (fixed-size tiers don't autoscale).

                  Rules on nested ClusterData fields live here rather than on
                  ClusterData itself because ClusterData is emitted by gencrossplane
                  types from the upstream Akuity wire type; marker edits on the leaf
                  would be wiped by the next generator sync.

                  Note: self.data is a non-pointer inline struct on the Go side, so
                  kube-apiserver treats it as always-present (it never evaluates to
                  absent at admission time). We therefore guard only the
                  omitempty-tagged children (size, maintenanceModeExpiry,
                  autoscalerConfig) with has() — not data itself.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations applied to the cluster custom resource.
                    type: object
                  data:
                    description: Data holds the cluster data configuration.
                    properties:
                      appReplication:
                        type: boolean
                      argocdNotificationsSettings:
                        properties:
                          inClusterSettings:
                            type: boolean
                        type: object
                      autoUpgradeDisabled:
                        type: boolean
                      autoscalerConfig:
                        properties:
                          applicationController:
                            properties:
                              resourceMaximum:
                                properties:
                                  cpu:
                                    type: string
                                  mem:
                                    type: string
                                type: object
                              resourceMinimum:
                                properties:
                                  cpu:
                                    type: string
                                  mem:
                                    type: string
                                type: object
                            type: object
                          repoServer:
                            properties:
                              replicaMaximum:
                                format: int32
                                type: integer
                              replicaMinimum:
                                format: int32
                                type: integer
                              resourceMaximum:
                                properties:
                                  cpu:
                                    type: string
                                  mem:
                                    type: string
                                type: object
                              resourceMinimum:
                                properties:
                                  cpu:
                                    type: string
                                  mem:
                                    type: string
                                type: object
                            type: object
                        type: object
                      compatibility:
                        properties:
                          ipv6Only:
                            type: boolean
                        type: object
                      datadogAnnotationsEnabled:
                        type: boolean
                      directClusterSpec:
                        properties:
                          caData:
                            type: string
                          clusterType:
                            type: string
                          kargoInstanceId:
                            type: string
                          organization:
                            type: string
                          server:
                            type: string
                          token:
                            type: string
                        type: object
                      eksAddonEnabled:
                        type: boolean
                      kustomization:
                        type: string
                      maintenanceMode:
                        type: boolean
                      maintenanceModeExpiry:
                        format: date-time
                        type: string
                      managedClusterConfig:
                        properties:
                          secretKey:
                            type: string
                          secretName:
                            type: string
                        type: object
                      multiClusterK8sDashboardEnabled:
                        type: boolean
                      podInheritMetadata:
                        type: boolean
                      project:
                        type: string
                      redisTunneling:
                        type: boolean
                      serverSideDiffEnabled:
                        type: boolean
                      size:
                        type: string
                      targetVersion:
                        type: string
                    type: object
                  description:
                    description: Description is a free-form description of the cluster.
                    type: string
                  instanceId:
                    description: |-
                      InstanceID references the Akuity ArgoCD Instance the cluster
                      belongs to by its opaque ID. Either InstanceID or InstanceRef must
                      be set.
                    type: string
                  instanceRef:
                    description: |-
                      InstanceRef references the Akuity ArgoCD Instance the cluster
                      belongs to by name in the same namespace as this Cluster.
                    properties:
                      name:
                        description: Name of the referenced object. Required.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels applied to the cluster custom resource.
                    type: object
                  name:
                    description: Name of the cluster in the Akuity Platform. Required.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace in the managed Kubernetes cluster where the Akuity
                      agent should be installed.
                    type: string
                  namespaceScoped:
                    description: NamespaceScoped toggles whether the agent is namespace-scoped.
                    type: boolean
                required:
                - name
                type: object
                x-kubernetes-validations:
                - message: exactly one of instanceId or instanceRef must be set
                  rule: has(self.instanceId) != has(self.instanceRef)
                - message: maintenanceModeExpiry requires maintenanceMode=true
                  rule: '!has(self.data.maintenanceModeExpiry) || (has(self.data.maintenanceMode)
                    && self.data.maintenanceMode)'
                - message: size=custom requires autoscalerConfig
                  rule: '!has(self.data.size) || self.data.size != ''custom'' || has(self.data.autoscalerConfig)'
                - message: autoscalerConfig only valid for size=auto or size=custom
                  rule: '!has(self.data.autoscalerConfig) || (has(self.data.size)
                    && (self.data.size == ''auto'' || self.data.size == ''custom''))'
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: A ClusterStatus represents the observed state of a Cluster.
            properties:
              atProvider:
                description: ClusterObservation are the observable fields of a Cluster.
                properties:
                  agentSize:
                    description: AgentSize is the observed agent sizing profile.
                    type: string
                  agentState:
                    description: AgentState captures the per-component agent state.
                    properties:
                      argoCdVersion:
                        description: ArgoCdVersion bundled with the running agent.
                        type: string
                      statuses:
                        additionalProperties:
                          description: |-
                            ClusterObservationAgentHealthStatus is a per-agent status snapshot.
                            Shell-owned; see ClusterObservationAgentState.
                          properties:
                            code:
                              description: Code reports the agent's numeric status
                                code.
                              format: int32
                              type: integer
                            message:
                              description: Message reports the agent's human-readable
                                status message.
                              type: string
                          type: object
                        description: Statuses reports the per-agent health statuses.
                        type: object
                      version:
                        description: Version of the running agent.
                        type: string
                    type: object
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations applied to the cluster in the Akuity
                      Platform.
                    type: object
                  appReplication:
                    description: |-
                      AppReplication reflects the observed ApplicationReplication
                      toggle.
                    type: boolean
                  autoUpgradeDisabled:
                    description: AutoUpgradeDisabled reflects the observed auto-upgrade
                      toggle.
                    type: boolean
                  description:
                    description: Description of the cluster.
                    type: string
                  healthStatus:
                    description: HealthStatus captures the cluster health status code
                      and message.
                    properties:
                      code:
                        description: Code reported by the Akuity API.
                        format: int32
                        type: integer
                      message:
                        description: Message reported by the Akuity API.
                        type: string
                    type: object
                  id:
                    description: ID assigned by the Akuity Platform.
                    type: string
                  kustomization:
                    description: Kustomization is the observed kustomization YAML.
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels applied to the cluster in the Akuity Platform.
                    type: object
                  name:
                    description: Name of the cluster.
                    type: string
                  namespace:
                    description: Namespace in the managed cluster where the agent
                      is installed.
                    type: string
                  namespaceScoped:
                    description: NamespaceScoped reports whether the agent is namespace-scoped.
                    type: boolean
                  reconciliationStatus:
                    description: ReconciliationStatus captures the cluster reconciliation
                      status.
                    properties:
                      code:
                        description: Code reported by the Akuity API.
                        format: int32
                        type: integer
                      message:
                        description: Message reported by the Akuity API.
                        type: string
                    type: object
                  redisTunneling:
                    description: RedisTunneling reflects the observed redis-tunneling
                      toggle.
                    type: boolean
                  targetVersion:
                    description: TargetVersion is the agent version currently targeted.
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
