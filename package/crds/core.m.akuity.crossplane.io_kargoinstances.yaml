                  kargoRepoCredentialSecretRefs:
                    description: |-
                      KargoRepoCredentialSecretRefs registers repository credentials
                      with the Kargo gateway. Each entry's SecretRef points at a
                      Secret in the MR's namespace; the controller synthesises a
                      labelled Kargo-shaped Secret (kargo.akuity.io/cred-type=<type>)
                      named after the slot, writes it into the entry's
                      ProjectNamespace, and forwards it to ApplyKargoInstance.
                      Plaintext never lives on the managed resource spec.

                      Drift: this field is write-only on the Kargo gateway — the
                      Export response does not return repo_credentials — so rotation
                      participates in drift via the SecretHash on
                      status.atProvider. Removal from spec does NOT delete the
                      Secret on the gateway; see the additive-semantics note on
                      resources below.
                    items:
                      description: |-
                        KargoRepoCredentialSecretRef binds a Kargo repository-credential slot
                        to a kube Secret in the same namespace as the referring managed
                        resource. Mirrors the ArgoCD NamedLocalSecretReference pattern — no
                        plaintext on the MR spec — but carries the extra Kargo-specific
                        identity bits (project namespace + credential type) needed to route
                        the resulting Secret into the correct Kargo project on the gateway.
                      properties:
                        credType:
                          description: |-
                            CredType selects the Kargo credential family. Stamped onto the
                            Secret as the kargo.akuity.io/cred-type label before submission.
                          enum:
                          - git
                          - helm
                          - generic
                          - image
                          type: string
                        name:
                          description: |-
                            Name is the Secret name written into the Kargo project.
                            Must be DNS-1123-compatible. The slot uniquely identifies the
                            credential within its ProjectNamespace.
                          maxLength: 253
                          minLength: 1
                          pattern: ^[a-z0-9][a-z0-9-]*$
                          type: string
                        projectNamespace:
                          description: |-
                            ProjectNamespace is the Kargo project namespace the credential
                            belongs to. Kargo enforces DNS-1123 naming on project
                            namespaces; the Pattern here mirrors that.
                          maxLength: 253
                          minLength: 1
                          pattern: ^[a-z0-9][a-z0-9-]*$
                          type: string
                        secretRef:
                          description: |-
                            SecretRef points at a Secret in the same namespace as the
                            referring managed resource. All keys of that Secret are
                            forwarded to the gateway verbatim under the slot Name.
                          properties:
                            name:
                              description: Name of the secret.
                              type: string
                          required:
                          - name
                          type: object
                      required:
                      - credType
                      - name
                      - projectNamespace
                      - secretRef
                      type: object
                    type: array
                    x-kubernetes-validations:
                    - message: kargoRepoCredentialSecretRefs entries must have unique
                        (projectNamespace, name) pairs
                      rule: size(self.map(e, e.projectNamespace + '/' + e.name)) ==
                        size(self)
                  kargoSecretRef:
                    description: |-
                      KargoSecretRef references a Secret whose data is sent verbatim
                      as the kargo-secret payload (OIDC client secrets, webhook
                      tokens, admin bootstrap).
                    properties:
                      name:
                        description: Name of the secret.
                        type: string
                    required:
                    - name
                    type: object
                  name:
                    description: Name of the Kargo instance in the Akuity Platform.
                      Required.
                    minLength: 1
                    type: string
                  resources:
                    description: |-
                      Resources carries raw YAML manifests for declarative Kargo
                      child resources (Projects, Warehouses, Stages,
                      AnalysisTemplates, PromotionTasks, ClusterPromotionTasks).
                      Repository-credential Secrets are NOT accepted here — the
                      parent-level CEL rule rejects v1/Secret entries at admission
                      time so inline credential data cannot land in etcd. Use
                      KargoRepoCredentialSecretRefs (typed refs) so plaintext stays
                      out of the MR spec and rotation flows through SecretHash drift.

                      The controller validates each entry's apiVersion/kind, groups
                      them by kind, and sends them alongside the instance spec on
                      every ApplyKargoInstance call. Write the YAML as an object,
                      not a string; the CRD is preserve-unknown-fields so the
                      payload is opaque to kube-apiserver structural validation
                      (CEL on specific kinds still runs). The Akuity gateway
                      rejects malformed payloads server-side.

                      Additive semantics: removing an entry from this list does NOT
                      delete the corresponding resource on the Akuity platform. The
                      controller does not enable ApplyKargoInstance's
                      PruneResourceTypes because out-of-band resources managed via
                      the Akuity UI or other tooling would be deleted as collateral
                      damage. To remove a resource, delete it via the Akuity
                      platform UI or API. See PARITY_PLAN.md for the rationale.
                    x-kubernetes-preserve-unknown-fields: true
                required:
                - kargo
                - name
                type: object
                x-kubernetes-validations:
                - message: set either kargo.oidcConfig.dexConfigSecretRef or kargo.oidcConfig.dexConfigSecret,
                    not both
                  rule: '!has(self.kargo.oidcConfig) || !has(self.kargo.oidcConfig.dexConfigSecretRef)
                    || !has(self.kargo.oidcConfig.dexConfigSecret) || size(self.kargo.oidcConfig.dexConfigSecret)
                    == 0'
                - message: v1/Secret entries are not accepted in spec.forProvider.resources;
                    use spec.forProvider.kargoRepoCredentialSecretRefs instead
                  rule: '!has(self.resources) || self.resources.all(r, !(has(r.apiVersion)
                    && has(r.kind) && r.apiVersion == ''v1'' && r.kind == ''Secret''))'
