                              enabled:
                                type: boolean
                              modelVersion:
                                type: string
                            type: object
                          argocdUi:
                            properties:
                              idpGroupsMapping:
                                type: boolean
                            type: object
                          backendIpAllowListEnabled:
                            type: boolean
                          defaultShardAgent:
                            type: string
                          gcConfig:
                            properties:
                              maxRetainedFreight:
                                format: int32
                                type: integer
                              maxRetainedPromotions:
                                format: int32
                                type: integer
                              minFreightDeletionAge:
                                format: int32
                                type: integer
                              minPromotionDeletionAge:
                                format: int32
                                type: integer
                            type: object
                          globalCredentialsNs:
                            items:
                              type: string
                            type: array
                          globalServiceAccountNs:
                            items:
                              type: string
                            type: array
                          ipAllowList:
                            items:
                              properties:
                                description:
                                  type: string
                                ip:
                                  type: string
                              type: object
                            type: array
                          promoControllerEnabled:
