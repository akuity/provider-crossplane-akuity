      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: A KargoInstance is an Akuity-managed Kargo control-plane instance.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A KargoInstanceSpec defines the desired state of a Kargo
              instance.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: |-
                  KargoInstanceParameters are the configurable fields of a Kargo
                  instance.

                  CEL rules:
                    - dexConfigSecretRef and dexConfigSecret (both on
                      kargo.oidcConfig) are mutually exclusive. Callers that inlined
                      the secret map can keep doing so; new deployments should use
                      dexConfigSecretRef so plaintext never lives on the managed
                      resource spec.
                    - kargoConfigMap keys are constrained to the platform's KargoApiCM
                      proto field set (see KargoConfigMapAllowedKeys). Any other
                      key would crash ApplyKargoInstance's strict protojson unmarshal
                      server-side and hot-loop the reconciler on retries.

                  v1/Secret manifests are forbidden inside resources, but the check
                  lives in the controller (splitKargoResources) rather than CEL: the
                  field is schemaless/preserve-unknown-fields, which hides its element
                  shape from the apiserver's CEL compiler and would fail CRD install
                  with "undefined field 'resources'". Repository credentials must
                  flow through kargoRepoCredentialSecretRefs (typed refs); inline
                  v1/Secret entries in resources are rejected at reconcile time.
                properties:
                  kargo:
                    description: |-
                      Kargo contains the Kargo configuration sent to the Akuity platform.
                      Required.
                    properties:
                      description:
                        type: string
                      fqdn:
                        type: string
                      kargoInstanceSpec:
                        properties:
                          agentCustomizationDefaults:
                            properties:
                              autoUpgradeDisabled:
                                type: boolean
                              kustomization:
                                type: string
                            type: object
                          akuityIntelligence:
                            properties:
                              aiSupportEngineerEnabled:
                                type: boolean
                              allowedGroups:
                                items:
                                  type: string
                                type: array
                              allowedUsernames:
                                items:
                                  type: string
                                type: array
                              enabled:
                                type: boolean
                              modelVersion:
                                type: string
                            type: object
                          argocdUi:
                            properties:
                              idpGroupsMapping:
                                type: boolean
                            type: object
                          backendIpAllowListEnabled:
                            type: boolean
                          defaultShardAgent:
                            type: string
                          gcConfig:
                            properties:
                              maxRetainedFreight:
                                format: int32
                                type: integer
                              maxRetainedPromotions:
                                format: int32
                                type: integer
                              minFreightDeletionAge:
                                format: int32
                                type: integer
                              minPromotionDeletionAge:
                                format: int32
                                type: integer
                            type: object
                          globalCredentialsNs:
                            items:
                              type: string
                            type: array
                          globalServiceAccountNs:
                            items:
                              type: string
                            type: array
                          ipAllowList:
                            items:
                              properties:
                                description:
                                  type: string
                                ip:
                                  type: string
                              type: object
                            type: array
                          promoControllerEnabled:
                            type: boolean
                          secrets:
                            properties:
                              destinations:
                                items:
                                  properties:
                                    clusters:
                                      properties:
                                        matchExpressions:
                                          items:
                                            properties:
                                              key:
                                                type: string
                                              operator:
                                                type: string
                                              values:
                                                items:
                                                  type: string
                                                type: array
                                            type: object
                                          type: array
                                        matchLabels:
                                          additionalProperties:
                                            type: string
                                          type: object
                                      type: object
                                    secrets:
                                      properties:
                                        matchExpressions:
                                          items:
                                            properties:
                                              key:
                                                type: string
                                              operator:
                                                type: string
                                              values:
                                                items:
                                                  type: string
                                                type: array
                                            type: object
                                          type: array
                                        matchLabels:
                                          additionalProperties:
                                            type: string
                                          type: object
                                      type: object
                                  type: object
                                type: array
                              sources:
                                items:
                                  properties:
                                    clusters:
                                      properties:
                                        matchExpressions:
                                          items:
                                            properties:
                                              key:
                                                type: string
                                              operator:
                                                type: string
                                              values:
                                                items:
                                                  type: string
                                                type: array
                                            type: object
                                          type: array
                                        matchLabels:
                                          additionalProperties:
                                            type: string
                                          type: object
                                      type: object
                                    secrets:
                                      properties:
                                        matchExpressions:
                                          items:
                                            properties:
                                              key:
                                                type: string
                                              operator:
                                                type: string
                                              values:
                                                items:
                                                  type: string
                                                type: array
                                            type: object
                                          type: array
                                        matchLabels:
                                          additionalProperties:
                                            type: string
                                          type: object
                                      type: object
                                  type: object
                                type: array
                            type: object
                        type: object
                      oidcConfig:
                        description: |-
                          KargoOidcConfig is emitted from the template (not from codegenStructs)
                          because it carries provider-specific overlays the Akuity Crossplane
                          provider needs but the upstream API source type does not define:

                            - DexConfigSecretRef: a namespaced Secret reference resolved at
                              reconcile time into the wire-shape DexConfigSecret map. Plaintext
                              dex credentials never live on the managed resource spec.
                            - // +optional markers on every field so controller-gen drops them
                              from the CRD's `required` array; the Akuity gateway accepts
                              ref-only or inline OIDC configurations.
                        properties:
                          additionalScopes:
                            items:
                              type: string
                            type: array
                          adminAccount:
                            properties:
                              claims:
                                additionalProperties:
                                  properties:
                                    values:
                                      items:
                                        type: string
                                      type: array
                                  required:
                                  - values
                                  type: object
                                type: object
                            type: object
                          cliClientId:
                            type: string
                          clientId:
                            type: string
                          dexConfig:
                            type: string
                          dexConfigSecret:
                            additionalProperties:
                              properties:
                                value:
                                  type: string
                              type: object
                            type: object
                          dexConfigSecretRef:
                            description: |-
                              DexConfigSecretRef references a namespaced Secret whose data is
                              resolved at reconcile time by the Crossplane provider and
                              forwarded to the Akuity gateway as the wire-shape
                              DexConfigSecret map. Mutually exclusive with the inline
                              DexConfigSecret above. Removing this ref stops applying the
                              platform-side Secret, but does not delete it from the Akuity
                              platform.
                            properties:
                              name:
                                description: Name of the secret.
                                type: string
                              namespace:
                                description: Namespace of the secret.
                                type: string
                            required:
                            - name
                            - namespace
                            type: object
                          dexEnabled:
                            type: boolean
                          enabled:
                            type: boolean
                          issuerUrl:
                            type: string
                          projectCreatorAccount:
                            properties:
                              claims:
                                additionalProperties:
                                  properties:
                                    values:
                                      items:
                                        type: string
                                      type: array
                                  required:
                                  - values
                                  type: object
                                type: object
                            type: object
                          userAccount:
