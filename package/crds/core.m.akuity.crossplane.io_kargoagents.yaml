---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: kargoagents.core.m.akuity.crossplane.io
spec:
  group: core.m.akuity.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - akuity
    kind: KargoAgent
    listKind: KargoAgentList
    plural: kargoagents
    singular: kargoagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          A KargoAgent is a Kargo agent installed in a managed Kubernetes
          cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A KargoAgentResourceSpec defines the desired state of a KargoAgent.
            properties:
              forProvider:
                description: KargoAgentParameters are the configurable fields of a
                  KargoAgent.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations applied to the agent.
                    type: object
                  kargoInstanceId:
                    description: |-
                      KargoInstanceID references the owning Kargo instance by ID.
                      Either KargoInstanceID or KargoInstanceRef must be set.
                    type: string
                  kargoInstanceRef:
                    description: |-
                      KargoInstanceRef references the owning Kargo instance by name in
                      the same namespace as this KargoAgent.
                    properties:
                      name:
                        description: Name of the referenced object. Required.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels applied to the agent.
                    type: object
                  name:
                    description: Name of the agent. Required.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace in the managed cluster where the agent
                      is installed.
                    type: string
                  spec:
                    description: Spec is the KargoAgent configuration.
                    properties:
                      data:
                        description: Data carries the agent configuration.
                        properties:
                          akuityManaged:
                            description: AkuityManaged marks the agent as Akuity-managed.
                            type: boolean
                          allowedJobSa:
                            description: |-
                              AllowedJobSa lists service-account names allowed to run jobs for
                              this agent.
                            items:
                              type: string
                            type: array
                          argocdNamespace:
                            description: ArgocdNamespace is the ArgoCD namespace the
                              agent observes.
                            type: string
                          autoUpgradeDisabled:
                            description: AutoUpgradeDisabled disables automatic agent
                              upgrades.
                            type: boolean
                          autoscalerConfig:
                            description: AutoscalerConfig configures Kargo-controller
                              autoscaling.
                            properties:
                              kargoController:
                                description: KargoController autoscaler config.
                                properties:
                                  resourceMaximum:
                                    description: ResourceMaximum allowed for the controller.
                                    properties:
                                      cpu:
                                        description: Cpu is the CPU request/limit.
                                        type: string
                                      mem:
                                        description: Mem is the memory request/limit.
                                        type: string
                                    type: object
                                  resourceMinimum:
                                    description: ResourceMinimum requested for the
                                      controller.
                                    properties:
                                      cpu:
                                        description: Cpu is the CPU request/limit.
                                        type: string
                                      mem:
                                        description: Mem is the memory request/limit.
                                        type: string
                                    type: object
                                type: object
                            type: object
                          kustomization:
                            description: Kustomization YAML applied to agent manifests.
                            type: string
                          maintenanceMode:
                            description: MaintenanceMode pauses reconciliation.
                            type: boolean
                          maintenanceModeExpiry:
                            description: |-
                              MaintenanceModeExpiry scopes MaintenanceMode to an absolute
                              deadline.
                            format: date-time
                            type: string
                          podInheritMetadata:
                            description: |-
                              PodInheritMetadata copies selected labels/annotations from the
                              agent pod template to the agent workload.
                            type: boolean
                          remoteArgocd:
                            description: |-
                              RemoteArgocd is the URL of a remote ArgoCD instance the agent
                              should talk to.
                            type: string
                          selfManagedArgocdUrl:
                            description: |-
                              SelfManagedArgocdUrl is the URL of a self-managed ArgoCD
                              instance bound to this agent.
                            type: string
                          size:
                            description: Size selects the agent sizing profile.
                            enum:
                            - unspecified
                            - small
                            - medium
                            - large
                            - auto
                            type: string
                          targetVersion:
                            description: TargetVersion pins the agent to a specific
                              version.
                            type: string
                        type: object
                      description:
                        description: Description is a free-form description of the
                          agent.
                        type: string
                    type: object
                  workspace:
                    description: Workspace is the Kargo project/workspace the agent
                      is bound to.
                    type: string
                required:
                - name
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: A KargoAgentStatus represents the observed state of a KargoAgent.
            properties:
              atProvider:
                description: KargoAgentObservation are the observable fields of a
                  KargoAgent.
                properties:
                  healthStatus:
                    description: HealthStatus is the agent health.
                    properties:
                      code:
                        description: Code reported by the Akuity API.
                        format: int32
                        type: integer
                      message:
                        description: Message reported by the Akuity API.
                        type: string
                    type: object
                  id:
                    description: ID assigned by the Akuity Platform.
                    type: string
                  reconciliationStatus:
                    description: ReconciliationStatus is the agent reconciliation
                      status.
                    properties:
                      code:
                        description: Code reported by the Akuity API.
                        format: int32
                        type: integer
                      message:
                        description: Message reported by the Akuity API.
                        type: string
                    type: object
                  workspace:
                    description: Workspace the agent is bound to.
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
