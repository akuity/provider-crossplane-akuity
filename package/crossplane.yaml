apiVersion: meta.pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-crossplane-akuity
  annotations:
    meta.crossplane.io/maintainer: Akuity <info@akuity.io>
    meta.crossplane.io/source: github.com/akuity/provider-crossplane-akuity
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/friendly-name: Provider Akuity
    meta.crossplane.io/description: |
      Manage Akuity Platform Argo CD instances, Kargo instances, attached
      clusters, and agents declaratively from a Crossplane control plane.
spec:
  capabilities:
    - safe-start
  # safe-start is a 2.x capability; declaring it on 1.x cores is a
  # no-op. The runtime-v2 bundle is compatible with Crossplane 1.19+
  # and 2.x out of the same artifact; customer floor is 1.19.0.
  crossplane:
    version: ">=v1.19.0"
