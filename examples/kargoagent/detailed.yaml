---
apiVersion: core.akuity.crossplane.io/v1alpha1
kind: KargoAgent
metadata:
  name: my-kargo-agent
spec:
  forProvider:
    # The Kargo instance ID can be hardcoded or resolved via a
    # KargoInstance MR in the same Crossplane cluster.
    # kargoInstanceId: "my-kargo-instance-id"
    kargoInstanceRef:
      name: "my-kargo"
    name: "my-kargo-agent"
    namespace: "kargo"
    workspace: "my-project"
    labels:
      team: "platform"
    annotations:
      note: "managed by crossplane"
    kargoAgentSpec:
      description: "The my-kargo-agent agent runs Kargo controllers on the shared cluster."
      data:
        size: "auto"
        autoUpgradeDisabled: false
        # Kargo agent version. Do not use a leading "v" here.
        targetVersion: "0.5.88"
        kustomization: |
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          patches:
            - patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: kargo-controller
                spec:
                  template:
                    spec:
                      containers:
                        - name: kargo-controller
                          resources:
                            limits:
                              memory: 1Gi
                            requests:
                              cpu: 250m
                              memory: 512Mi
              target:
                kind: Deployment
                name: kargo-controller
        akuityManaged: false
        argocdNamespace: "argocd"
        selfManagedArgocdUrl: "https://argocd.example.com"
        allowedJobSa:
          - "kargo:default"
        maintenanceMode: false
        podInheritMetadata: true
        autoscalerConfig:
          kargoController:
            resourceMinimum:
              mem: "512Mi"
              cpu: "250m"
            resourceMaximum:
              mem: "2Gi"
              cpu: "1"
  providerConfigRef:
    name: akuity
