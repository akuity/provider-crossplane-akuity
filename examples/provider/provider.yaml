---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: akuity
spec:
  package: us-docker.pkg.dev/akuity/crossplane/provider:v0.3.0
  runtimeConfigRef:
    name: akuity
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: akuity
spec:
  deploymentTemplate:
    spec:
      template:
        spec:
          containers:
            - name: package-runtime
              args:
                - --debug
          securityContext:
            fsGroup: 2000
---
apiVersion: v1
kind: Secret
metadata:
  namespace: crossplane-system
  name: akuity-provider-secret
type: Opaque
data:
  credentials: REPLACE_ME
