---
apiVersion: core.akuity.crossplane.io/v1alpha1
kind: Cluster
metadata:
  name: my-cluster-custom
spec:
  forProvider:
    instanceRef:
      name: "my-instance"
    name: "my-cluster-custom"
    namespace: "akuity"
    labels:
      team: "platform"
    annotations:
      owner: "crossplane"
    clusterSpec:
      namespaceScoped: true
      description: "Cluster with explicitly configured agent resources."
      data:
        size: "custom"
        # custom is a provider-side convenience. The provider sends
        # platform size "large" plus generated kustomization patches.
        autoUpgradeDisabled: false
        customAgentSizeConfig:
          applicationController:
            cpu: "1000m"
            mem: "2Gi"
          repoServer:
            cpu: "750m"
            mem: "1Gi"
            replicas: 3
  providerConfigRef:
    name: akuity
