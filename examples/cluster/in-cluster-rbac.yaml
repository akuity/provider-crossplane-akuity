---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-crossplane-akuity-in-cluster
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-crossplane-akuity-in-cluster
rules:
  # Baseline provider permissions. These mirror the rules Crossplane normally
  # grants to the generated ProviderRevision ServiceAccount. When this
  # DeploymentRuntimeConfig points the pod at this customer-managed
  # ServiceAccount, the generated binding no longer covers the running pod.
  # Without these rules the controller cannot watch its managed resources,
  # read ProviderConfigs, read credential Secrets, or hold the leader-election
  # Lease.
  - apiGroups:
      - core.akuity.crossplane.io
    resources:
      - clusters
      - clusters/status
      - instanceipallowlists
      - instanceipallowlists/status
      - instances
      - instances/status
      - kargoagents
      - kargoagents/status
      - kargodefaultshardagents
      - kargodefaultshardagents/status
      - kargoinstances
      - kargoinstances/status
    verbs:
      - get
      - list
      - watch
      - update
      - patch
      - create
  - apiGroups:
      - akuity.crossplane.io
    resources:
      - providerconfigs
      - providerconfigs/status
      - providerconfigusages
      - providerconfigusages/status
    verbs:
      - get
      - list
      - watch
      - update
      - patch
      - create
  - apiGroups:
      - core.akuity.crossplane.io
      - akuity.crossplane.io
    resources:
      - "*/finalizers"
    verbs:
      - update
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
    verbs:
      - "*"
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - "*"
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - "*"
  # Agent manifest apply/teardown uses server-side apply and foreground delete.
  - apiGroups:
      - ""
    resources:
      - namespaces
      - serviceaccounts
      - services
    verbs:
      - get
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
    verbs:
      - get
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs:
      - get
      - create
      - update
      - patch
      - delete
  # Kubernetes RBAC escalation prevention rejects creating/updating Roles
  # and ClusterRoles unless the caller already holds the granted permissions
  # or has escalate. It also rejects RoleBindings/ClusterRoleBindings unless
  # the caller has bind on the referenced Role/ClusterRole.
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - clusterroles
    verbs:
      - bind
      - escalate
  # events.k8s.io/v1 recorder API used by controller-runtime.
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - get
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-crossplane-akuity-in-cluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provider-crossplane-akuity-in-cluster
subjects:
  - kind: ServiceAccount
    name: provider-crossplane-akuity-in-cluster
    namespace: crossplane-system
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: akuity-in-cluster
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          serviceAccountName: provider-crossplane-akuity-in-cluster
          containers:
            - name: package-runtime
