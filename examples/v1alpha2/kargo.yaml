# v1alpha2 Kargo resources: a KargoInstance, a KargoAgent, a
# KargoDefaultShardAgent, and an InstanceIpAllowList that is paired
# with an ArgoCD Instance which deliberately does NOT set ipAllowList
# itself.
#
# KargoDefaultShardAgent and InstanceIpAllowList are narrow-patch
# resources that key by Akuity ID. The snippets below show the
# kubeInstanceRef / instanceRef form (the controller resolves the ID
# from the referenced MR's Status.AtProvider.ID). If you already know
# the Akuity ID, use kargoInstanceId / instanceId directly — mutually
# exclusive with the ref form.
---
apiVersion: core.m.akuity.crossplane.io/v1alpha2
kind: KargoInstance
metadata:
  name: platform-kargo
  namespace: default
spec:
  forProvider:
    name: platform-kargo
    kargo:
      description: "Platform Kargo"
      version: "v1.2.0"
      # kargoInstanceSpec keeps the nesting from the upstream wire type.
      # oidcConfig, fqdn, subdomain are siblings of kargoInstanceSpec
      # inside .spec.* (not hoisted to forProvider).
      kargoInstanceSpec:
        backendIpAllowListEnabled: true
        promoControllerEnabled: true
        globalCredentialsNs:
          - platform
        globalServiceAccountNs:
          - platform-sa
  providerConfigRef:
    kind: ProviderConfig
    name: akuity
---
apiVersion: core.m.akuity.crossplane.io/v1alpha2
kind: KargoAgent
metadata:
  name: prod-agent
  namespace: default
spec:
  forProvider:
    name: prod-agent
    kargoInstanceRef:
      name: platform-kargo
    # Description is a forProvider sibling (like Cluster); .data points
    # at the wire KargoAgentData directly — same shape as Cluster.data.
    description: "production agent"
    data:
      size: medium
      targetVersion: v1.1.0
      akuityManaged: true
      argocdNamespace: argocd
  providerConfigRef:
    kind: ProviderConfig
    name: akuity
  writeConnectionSecretToRef:
    name: prod-agent-manifests
---
apiVersion: core.m.akuity.crossplane.io/v1alpha2
kind: KargoDefaultShardAgent
metadata:
  name: platform-default-shard
  namespace: default
spec:
  forProvider:
    # Reference the owning KargoInstance MR; controller resolves its
    # Status.AtProvider.ID. Alternatively:
    #   kargoInstanceId: "kargo-xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    kargoInstanceRef:
      name: platform-kargo
    agentName: prod-agent
  providerConfigRef:
    kind: ProviderConfig
    name: akuity
---
apiVersion: core.m.akuity.crossplane.io/v1alpha2
kind: InstanceIpAllowList
metadata:
  name: my-instance-allowlist
  namespace: default
spec:
  forProvider:
    # Reference the owning Instance MR; controller resolves its
    # Status.AtProvider.ID. Alternatively:
    #   instanceId: "instance-xxxxxxxxxxxxxxxxxxxxxxxxx"
    instanceRef:
      name: my-instance
    allowList:
      - ip: "10.0.0.0/8"
        description: "VPC"
      - ip: "192.168.0.0/16"
        description: "Lab"
  providerConfigRef:
    kind: ProviderConfig
    name: akuity
