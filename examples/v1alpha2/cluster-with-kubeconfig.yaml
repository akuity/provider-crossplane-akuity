# Two variants of v1alpha2 Cluster with inline agent install.
#
# When either kubeconfigSecretRef or enableInClusterKubeconfig is set,
# the provider fetches the Akuity-generated agent install manifests
# and server-side applies them directly to the managed cluster on
# Create/Update. On deletion, if removeAgentResourcesOnDestroy is true
# the same path runs in delete mode before the platform-side record is
# removed. Mutual exclusion between the two kubeconfig sources is
# enforced by CEL on the CRD.
#
# If neither field is set, the provider only manages the Akuity
# platform record. The user is then responsible for installing the
# agent on the managed cluster through any other means (Argo CD App,
# Flux, a Job running kubectl apply, etc.).
---
# Variant 1: managed cluster reached via a kubeconfig stored in a
# same-namespace Secret under the "kubeconfig" data key.
apiVersion: v1
kind: Secret
metadata:
  name: prod-kubeconfig
  namespace: default
type: Opaque
stringData:
  kubeconfig: |
    apiVersion: v1
    kind: Config
    # ... contents elided
---
apiVersion: core.m.akuity.crossplane.io/v1alpha2
kind: Cluster
metadata:
  name: prod-cluster
  namespace: default
spec:
  forProvider:
    name: prod-cluster
    instanceRef:
      name: my-instance
    kubeconfigSecretRef:
      name: prod-kubeconfig
    removeAgentResourcesOnDestroy: true
  providerConfigRef:
    kind: ProviderConfig
    name: akuity
---
# Variant 2: managed cluster is the same cluster the provider pod runs
# in; use the pod's own ServiceAccount to apply the manifests. The
# provider's ServiceAccount must carry permissions sufficient to install
# the agent (Deployments, CRDs, RBAC, namespace creation, etc.).
apiVersion: core.m.akuity.crossplane.io/v1alpha2
kind: Cluster
metadata:
  name: local-cluster
  namespace: default
spec:
  forProvider:
    name: local-cluster
    instanceRef:
      name: my-instance
    enableInClusterKubeconfig: true
    removeAgentResourcesOnDestroy: true
  providerConfigRef:
    kind: ProviderConfig
    name: akuity
