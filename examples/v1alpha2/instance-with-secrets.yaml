# Instance with sensitive payloads wired to the Akuity gateway via
# same-namespace Secret references. All credential material lives in
# Kubernetes Secrets; the MR only carries references, so plaintext
# never appears on the managed resource spec.
#
# Controller responsibilities:
#   * Reads referenced Secrets at reconcile time; forwards keys to
#     the gateway under the matching argocd-* / argocd-application-set
#     secret slots.
#   * Labels repo/repo-template credential secrets with the appropriate
#     argocd.argoproj.io/secret-type=repository|repo-creds annotation
#     before send.
#   * Records a SHA256 of every resolved Secret in the
#     akuity.crossplane.io/secret-hash annotation so a subsequent
#     rotation of the backing Secret triggers a fresh Apply even
#     though the gateway masks secret contents on read.
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-admin
  namespace: default
type: Opaque
stringData:
  admin.password: "$2a$10$replace-with-bcrypt-hash"
  server.secretkey: "replace-with-long-random"
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications
  namespace: default
type: Opaque
stringData:
  slack-token: "xoxb-replace"
  email-password: "smtp-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: repo-github-main
  namespace: default
type: Opaque
stringData:
  url: "https://github.com/acme/platform.git"
  username: "bot"
  password: "ghp_replace"
---
apiVersion: core.m.akuity.crossplane.io/v1alpha2
kind: Instance
metadata:
  name: my-instance
  namespace: default
spec:
  forProvider:
    name: my-instance
    argocd:
      spec:
        version: "v3.1.9-ak.67"
    argocdConfigMap:
      url: "https://argocd.example.com"
    argocdSecretRef:
      name: argocd-admin
    argocdNotificationsSecretRef:
      name: argocd-notifications
    repoCredentialSecretRefs:
      - name: repo-github-main    # gateway slot name; must start with "repo-"
        secretRef:
          name: repo-github-main  # Kubernetes Secret name
  providerConfigRef:
    kind: ProviderConfig
    name: akuity
