# KargoInstance with the kargo-cm ConfigMap and kargo-secret credential
# bundle wired declaratively. The ConfigMap sits inline on the spec
# (non-sensitive); the Secret content is referenced by name and
# resolved by the controller at reconcile time.
---
apiVersion: v1
kind: Secret
metadata:
  name: kargo-creds
  namespace: default
type: Opaque
stringData:
  admin.password: "bcrypt-hash-here"
  dex.connector.github.clientSecret: "replace-me"
---
apiVersion: core.m.akuity.crossplane.io/v1alpha2
kind: KargoInstance
metadata:
  name: my-kargo
  namespace: default
spec:
  forProvider:
    name: my-kargo
    spec:
      version: "v1.4.0"
      subdomain: "my-kargo"
      oidcConfig:
        enabled: true
        dexEnabled: true
        issuerUrl: "https://dex.example.com"
        clientId: "kargo"
        # The dex client secret lives in a Kubernetes Secret and is
        # resolved at reconcile time. Mutually exclusive with the
        # inline dexConfigSecret map; the CRD's CEL rule rejects
        # setting both on the same instance.
        dexConfigSecretRef:
          name: kargo-creds
    kargoConfigMap:
      admin.accountEnabled: "true"
      telemetryDisabled: "false"
    kargoSecretRef:
      name: kargo-creds
  providerConfigRef:
    kind: ProviderConfig
    name: akuity
