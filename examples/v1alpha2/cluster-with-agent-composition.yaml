# Pulls the Akuity agent-install YAML out of the Cluster MR's connection
# secret and delivers it to the target managed cluster as a ConfigMap
# using provider-kubernetes. The resulting ConfigMap is then the input
# to whatever apply-step your platform already has (a Job running
# kubectl apply, an Argo CD Application pointing at the ConfigMap, a
# function-go-templating composition that fans the multi-document YAML
# into one Object per resource, etc.) — turning multi-document YAML
# into live objects is deliberately out of scope for this example.
#
# What this file does demonstrate:
#   - v1alpha2 Cluster publishes install YAML on its connection secret
#     under key `manifests`.
#   - A Composition reads that key via FromConnectionSecretKey and
#     patches it into a provider-kubernetes Object whose payload is a
#     ConfigMap landing on the target cluster.
#
# Prereqs:
#   1. provider-kubernetes installed in the control cluster
#      (crossplane-contrib/provider-kubernetes).
#   2. A kubernetes.crossplane.io/v1alpha1 ProviderConfig pointing at
#      the target managed cluster's kubeconfig.
#   3. A Composite Resource Definition (XRD) XAkuityCluster (not shown
#      here) exposing: `name`, `instanceRef`, `agentKubeProviderConfigRef`.
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: akuity-cluster-with-agent
  labels:
    provider: akuity
spec:
  compositeTypeRef:
    apiVersion: platform.example.com/v1alpha1
    kind: XAkuityCluster
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # 1. The Akuity-side managed Cluster. Its connection secret
          #    carries the install manifests on key `manifests`.
          - name: akuity-cluster
            base:
              apiVersion: core.m.akuity.crossplane.io/v1alpha2
              kind: Cluster
              spec:
                forProvider:
                  name: "" # patched
                providerConfigRef:
                  kind: ProviderConfig
                  name: akuity
                writeConnectionSecretToRef:
                  name: "" # patched
            patches:
              - fromFieldPath: spec.name
                toFieldPath: spec.forProvider.name
              - fromFieldPath: spec.instanceRef.name
                toFieldPath: spec.forProvider.instanceRef.name
              - fromFieldPath: spec.name
                toFieldPath: spec.writeConnectionSecretToRef.name
                transforms:
                  - type: string
                    string:
                      fmt: "%s-manifests"

          # 2. A provider-kubernetes Object. Its manifest is a ConfigMap
          #    on the target cluster, and `data.manifests` is populated
          #    from the akuity-cluster's connection-secret key
          #    `manifests` via a FromConnectionSecretKey patch.
          - name: agent-install
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha1
              kind: Object
              spec:
                providerConfigRef:
                  name: "" # patched
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      name: akuity-agent-manifests
                      namespace: akuity
                    data:
                      manifests: "" # patched from akuity-cluster connection secret
            patches:
              - fromFieldPath: spec.agentKubeProviderConfigRef.name
                toFieldPath: spec.providerConfigRef.name
              - fromFieldPath: spec.name
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      fmt: "%s-agent-install"
              # FromConnectionSecretKey reads a key off the previously
              # listed composed resource's connection secret and writes
              # it into this resource. `fromConnectionSecretKey` is the
              # secret key on the *source* resource; the source is
              # identified by position in `resources[]` (here,
              # akuity-cluster, index 0).
              - type: FromConnectionSecretKey
                fromConnectionSecretKey: manifests
                toFieldPath: spec.forProvider.manifest.data.manifests

    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: function-auto-ready
