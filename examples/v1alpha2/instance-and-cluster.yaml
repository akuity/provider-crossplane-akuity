# A v1alpha2 namespaced Instance plus a Cluster that references it by
# same-namespace InstanceRef. Note the `.m.akuity` group and
# `providerConfigRef.kind: ProviderConfig` (set to `ClusterProviderConfig`
# when using the cluster-wide variant).
---
apiVersion: core.m.akuity.crossplane.io/v1alpha2
kind: Instance
metadata:
  name: my-instance
  namespace: default
spec:
  forProvider:
    name: my-instance
    argocd:
      version: "v3.1.9-ak.67"
  providerConfigRef:
    kind: ProviderConfig
    name: akuity
---
apiVersion: core.m.akuity.crossplane.io/v1alpha2
kind: Cluster
metadata:
  name: my-cluster
  namespace: default
spec:
  forProvider:
    name: my-cluster
    # Either set instanceId directly, or reference an Instance in the
    # same namespace via instanceRef.
    instanceRef:
      name: my-instance
    # To have the provider install the Akuity agent onto the managed
    # cluster directly, set exactly one of kubeconfigSecretRef or
    # enableInClusterKubeconfig. See cluster-with-kubeconfig.yaml.
  providerConfigRef:
    kind: ProviderConfig
    name: akuity
