# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: my-kargo-secret
#   namespace: crossplane-system
# type: Opaque
# stringData:
#   # Accepted kargo-secret key for admin account bootstrap.
#   adminAccountPasswordHash: REPLACE_ME_WITH_BCRYPT_HASH
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: my-kargo-dex
#   namespace: crossplane-system
# type: Opaque
# stringData:
#   # Resolved at reconcile time and forwarded as the gateway
#   # DexConfigSecret map. Plaintext never lives on the MR spec.
#   foo: bar
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: repo-github
#   namespace: crossplane-system
#   labels:
#     # Optional when the ref sets credType explicitly.
#     kargo.akuity.io/cred-type: git
# type: Opaque
# stringData:
#   # Kargo repo credential slot - see kargoRepoCredentialSecretRefs
#   # below. The controller synthesizes a labeled Kargo-shaped Secret
#   # (kargo.akuity.io/cred-type=<type>) from these keys.
#   url: https://github.com/my-org/my-repo
#   username: git
#   password: REPLACE_ME
---
apiVersion: core.akuity.crossplane.io/v1alpha1
kind: KargoInstance
metadata:
  name: my-kargo
spec:
  forProvider:
    name: my-kargo
    kargo:
      description: "My Kargo instance used for my project."
      version: "v1.10.1-ak.0"
      fqdn: "kargo.example.com"
      # Use either fqdn or subdomain, not both.
      # subdomain: "my-kargo"
      kargoInstanceSpec:
        backendIpAllowListEnabled: true
        ipAllowList:
          - description: "office"
            ip: "1.2.3.4"
        agentCustomizationDefaults:
          autoUpgradeDisabled: false
        defaultShardAgent: "shard-a"
        globalCredentialsNs:
          - "kargo-shared"
        globalServiceAccountNs:
          - "kargo-shared"
        akuityIntelligence:
          enabled: true
          aiSupportEngineerEnabled: true
          allowedUsernames:
            - "admin"
          allowedGroups:
            - "developers"
        gcConfig:
          maxRetainedFreight: 20
          maxRetainedPromotions: 20
          minFreightDeletionAge: 336
          minPromotionDeletionAge: 336
        promoControllerEnabled: true
        argocdUi:
          idpGroupsMapping: true
      oidcConfig:
        enabled: true
        issuerUrl: "https://id.example.com"
        clientId: "my-kargo"
        cliClientId: "my-kargo-cli"
        # Use dexConfigSecretRef instead of inlining dexConfigSecret to
        # keep plaintext out of the MR spec.
        # dexConfigSecretRef:
        #   namespace: crossplane-system
        #   name: my-kargo-dex
        additionalScopes:
          - "groups"
    kargoConfigMap:
      # Keys are forwarded to the kargo-cm ConfigMap. Use lowerCamel keys here;
      # they match the platform's canonical form.
      # To migrate from snake_case aliases, unset kargoConfigMap first, wait for
      # Synced=True, then apply the lowerCamel keys.
      # Set to "true" only when kargoSecretRef supplies
      # adminAccountPasswordHash or the hash already exists in Akuity.
      adminAccountEnabled: "false"
      adminAccountTokenTtl: "24h"
    # kargoSecretRef references a Secret whose accepted keys become the
    # kargo-secret payload. Currently supported keys are
    # adminAccountPasswordHash and admin_account_password_hash.
    # kargoSecretRef:
    #   namespace: crossplane-system
    #   name: my-kargo-secret
    # kargoRepoCredentialSecretRefs registers repository credentials
    # with Kargo. Each entry's SecretRef points at a namespaced Secret;
    # the controller projects it into the effective project namespace
    # as a labeled Kargo-shaped Secret.
    # kargoRepoCredentialSecretRefs:
    #   - name: repo-github # optional; defaults to secretRef.name
    #     projectNamespace: my-project # required; the Kargo project namespace where the credential Secret is landed
    #     credType: git # optional; defaults to source Secret label
    #     secretRef:
    #       namespace: crossplane-system
    #       name: repo-github
    resources:
      # Inline Kargo resource manifests (Projects, Warehouses, Stages,
      # AnalysisTemplates, PromotionTasks, ClusterPromotionTasks). See
      # KargoInstanceParameters.Resources for additive-semantics notes.
      - apiVersion: kargo.akuity.io/v1alpha1
        kind: Project
        metadata:
          name: my-project
  providerConfigRef:
    name: akuity
