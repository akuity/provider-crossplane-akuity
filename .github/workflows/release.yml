name: Release

on:
  release:
    types:
      - published

env:
  GO_VERSION: "1.26.1"

jobs:
  build-and-release-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          install: true

      - name: Login to Google Artifact Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: us-docker.pkg.dev
          username: ${{ secrets.ARTIFACT_REGISTRY_USERNAME }}
          password: ${{ secrets.ARTIFACT_REGISTRY_PASSWORD }}

      - name: Login to Upbound Marketplace
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.XPKG_MARKETPLACE_ACCESS_ID }}
          password: ${{ secrets.XPKG_MARKETPLACE_TOKEN }}

      - name: Install Crane
        uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Find the Go Build Cache
        id: go
        run: echo "cache=$(make go.cachedir)" >> $GITHUB_OUTPUT

      - name: Cache the Go Build Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.go.outputs.cache }}
          key: ${{ runner.os }}-build-publish-artifacts-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-build-publish-artifacts-

      - name: Cache Go Dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .work/pkg
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-pkg-

      - name: Vendor Dependencies
        run: make vendor vendor.check

      - name: Build Artifacts
        run: make -j2 build.all
        env:
          # We're using docker buildx, which doesn't actually load the images it
          # builds by default. Specifying --load does so.
          BUILD_ARGS: "--load"
          VERSION: ${{ github.ref_name }}

      - name: Publish to Google Artifact Registry
        run: |
          set -euo pipefail
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/v2.2.0/install.sh | XP_VERSION=v2.2.0 sh
          sudo mv crossplane /usr/local/bin
          make akuity-publish.gar
        env:
          VERSION: ${{ github.ref_name }}

      - name: Mirror to Upbound Marketplace
        run: make akuity-publish.marketplace
        env:
          VERSION: ${{ github.ref_name }}

      - name: Install Upbound CLI
        env:
          UP_VERSION: v0.47.0
        run: |
          set -euo pipefail
          curl -sL https://cli.upbound.io | VERSION=${UP_VERSION} sh
          sudo mv up /usr/local/bin/up
          up version --client

      - name: Append Marketplace Extensions
        run: make akuity-publish.marketplace.extensions
        env:
          VERSION: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-warm doc.crds.dev index
        run: |
          curl -sf -o /dev/null \
            "https://doc.crds.dev/github.com/akuity/provider-crossplane-akuity@${VERSION}" \
            || echo "doc.crds.dev pre-warm failed; CRD docs will index on first visit."
        env:
          VERSION: ${{ github.ref_name }}
